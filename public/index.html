// ─── API ───
async function callClaude(msgs,apiKey,extraParams){
  if(!apiKey)throw new Error("Bitte API-Key eingeben (oben rechts).");
  const body=Object.assign({model:"claude-sonnet-4-20250514",max_tokens:1400,messages:msgs},extraParams||{});
  const r=await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
    body:JSON.stringify(body)
  });
  const d=await r.json();
  if(d.error)throw new Error(d.error.message||"API-Fehler");
  return(d.content&&d.content[0]&&d.content[0].text)||"";
}

async function analyzeJob(text,imgB64,imgType,url,cv,apiKey){
  const jsonSchema='Nur reines JSON, kein Markdown:\n{"companyName":"Firmenname","positionTitle":"Jobtitel","keywords":["kw1","kw2","kw3","kw4","kw5","kw6"],"mustHave":["Pflichtanforderung1","Pflichtanforderung2"],"niceToHave":["Wunschanforderung1"],"matchScore":82,"matchReason":"1-2 konkrete Sätze warum dieser Match-Score","suggestedSkills":["Skill1","Skill2","Skill3"],"adaptedJobTitle":"Angepasster Jobtitel","adaptedSummary":"2-3 Sätze: Wie dieser Kandidat perfekt zur Stelle passt – für Anschreiben-Einstieg","salaryRange":"falls erwähnt, sonst leer"}';
  const kandidat="\n\nKANDIDATENPROFIL:\n"+cvSum(cv);
  let msgs,tools=undefined;
  if(imgB64){
    msgs=[{role:"user",content:[{type:"image",source:{type:"base64",media_type:imgType,data:imgB64}},{type:"text",text:"Analysiere diese Stellenanzeige gründlich."+kandidat+"\n\n"+jsonSchema}]}];
  } else if(url){
    // Use web_search tool so Claude can actually fetch the URL
    tools=[{"type":"web_search_20250305","name":"web_search"}];
    msgs=[{role:"user",content:"Rufe diese Stellenanzeige ab und analysiere sie gründlich: "+url+kandidat+"\n\n"+jsonSchema}];
  } else {
    msgs=[{role:"user",content:"STELLENANZEIGE:\n"+text+kandidat+"\n\n"+jsonSchema}];
  }
  if(!apiKey)throw new Error("Bitte API-Key eingeben.");
  const body=Object.assign({model:"claude-sonnet-4-20250514",max_tokens:2000,messages:msgs},tools?{tools}:{});
  const r=await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
    body:JSON.stringify(body)
  });
  const d=await r.json();
  if(d.error)throw new Error(d.error.message||"API-Fehler");
  const raw=(d.content||[]).filter(function(b){return b.type==="text";}).map(function(b){return b.text;}).join("\n");
  return JSON.parse(raw.replace(/```json|```/g,"").trim());
}
